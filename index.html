<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BRUNA - Club Privado</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#35251A">
    <link rel="apple-touch-icon" href="icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-warm: #F4F1EA;
            --brand-dark: #2B1D14;
            --brand-accent: #C5A059; /* Dorado Bronce */
            --brand-gradient: linear-gradient(145deg, #35251A 0%, #1A110A 100%);
            --text-main: #35251A;
            --text-secondary: #7A6B5E;
            --glass: rgba(255, 255, 255, 0.8);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-warm);
            /* FONDO PRO: Patrón sutil de B y Café */
            background-image: url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%2335251A' fill-opacity='0.03'%3E%3Ctext x='10' y='30' font-family='sans-serif' font-weight='bold' font-size='18'%3EB%3C/text%3E%3Cpath d='M50 50c0-5.5 4.5-10 10-10s10 4.5 10 10v5h-20v-5zm20 0h3c1.7 0 3 1.3 3 3s-1.3 3-3 3h-3v-6z'/%3E%3Ccircle cx='20' cy='60' r='2'/%3E%3C/g%3E%3C/svg%3E");
            margin: 0; padding: 20px;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; color: var(--text-main);
        }

        /* --- MODALES --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(43, 29, 20, 0.5); backdrop-filter: blur(8px);
            z-index: 5000; display: none; align-items: center; justify-content: center; padding: 20px;
        }
        .modal-box {
            background: white; border-radius: 30px; padding: 40px 30px;
            width: 100%; max-width: 320px; text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
        }

        /* --- CONTENEDORES --- */
        .container-box {
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.4);
            border-radius: 35px;
            padding: 40px 30px;
            width: 100%; max-width: 360px;
            box-shadow: 0 20px 40px rgba(53, 37, 26, 0.05);
            text-align: center; display: none;
        }

        h2 { font-family: 'Lilita One', cursive; font-size: 34px; color: var(--brand-dark); margin: 0 0 10px 0; letter-spacing: 1px; }

        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { font-size: 11px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; margin-left: 10px; margin-bottom: 8px; display: block; }
        .input-box {
            width: 100%; padding: 18px; border-radius: 18px; border: 1.5px solid #E6DED5;
            font-size: 16px; box-sizing: border-box; font-family: 'Poppins', sans-serif;
            background: rgba(255, 255, 255, 0.5); transition: 0.3s;
        }
        .input-box:focus { border-color: var(--brand-accent); outline: none; background: #fff; }

        .btn-main {
            background: var(--brand-gradient); color: var(--brand-light); border: none;
            padding: 20px; width: 100%; border-radius: 20px; font-size: 16px;
            font-weight: 700; cursor: pointer; transition: 0.2s;
            box-shadow: 0 10px 25px rgba(53, 37, 26, 0.2);
        }
        .btn-main:active { transform: scale(0.96); }

        /* --- TARJETA --- */
        .flip-container { perspective: 1000px; width: 100%; max-width: 360px; height: 500px; cursor: pointer; }
        .flipper { position: relative; width: 100%; height: 100%; transition: 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); transform-style: preserve-3d; }
        .flipped .flipper { transform: rotateY(180deg); }
        .front, .back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 32px; overflow: hidden; }
        
        .front { background: var(--brand-gradient); padding: 30px; box-sizing: border-box; color: white; border: 1px solid rgba(255,255,255,0.1); }
        .back { transform: rotateY(180deg); background: var(--brand-gradient); display: flex; flex-direction: column; justify-content: center; align-items: center; }

        .card-pattern {
            position: absolute; top:0; left:0; width:100%; height:100%; opacity: 0.05; pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Ctext x='10' y='30' font-family='sans-serif' font-weight='bold' font-size='14' fill='white'%3EB%3C/text%3E%3C/svg%3E");
        }

        .stamps-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin: 30px 0; }
        .stamp-cup { width: 100%; height: auto; transition: 0.4s; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1)); }
        .stamp-cup path { fill: rgba(255,255,255,0.15); stroke: rgba(255,255,255,0.2); stroke-width: 1.5; }
        .filled path { fill: #F2E3A4 !important; stroke: #F2E3A4 !important; }

        .points-badge { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); margin-top: 20px; }
        .points-number { font-size: 32px; font-weight: 700; color: #F2E3A4; line-height: 1; }

        .btn-link { background: none; border: none; color: var(--text-secondary); text-decoration: underline; font-size: 13px; cursor: pointer; margin-top: 25px; }

        #cargando { font-weight: 600; color: var(--brand-dark); }
    </style>
</head>
<body>

    <div id="modalAlerta" class="modal-overlay">
        <div class="modal-box">
            <div id="modalTexto" class="custom-modal-text" style="font-weight: 600; margin-bottom: 25px; color: var(--brand-dark);">Mensaje</div>
            <button onclick="document.getElementById('modalAlerta').style.display='none'" class="btn-main" style="padding: 12px;">Entendido</button>
        </div>
    </div>

    <div id="cargando">BRUNA.</div>

    <div id="pantallaRegistro" class="container-box">
        <h2>BRUNA</h2>
        <p>Acceso exclusivo a beneficios.</p>
        <div class="input-group">
            <label>Nombre Completo</label>
            <input type="text" id="inputNombre" class="input-box" placeholder="Ej: Simon" required>
        </div>
        <div class="input-group">
            <label>Email de contacto</label>
            <input type="email" id="inputEmail" class="input-box" placeholder="simon@ejemplo.com" required>
        </div>
        <button class="btn-main" id="btnRegistrar">Activar Membresía</button>
        <button id="btnPWA" class="btn-link" style="display:none">Instalar Aplicación en Inicio</button>
    </div>

    <div id="pantallaTarjeta" style="display:none; width:100%; max-width:360px;">
        <p style="text-align:center; font-size:11px; font-weight:700; color:var(--text-secondary); text-transform:uppercase; letter-spacing:2px; margin-bottom:15px;">Toca para Girar</p>
        <div class="flip-container" onclick="this.classList.toggle('flipped')">
            <div class="flipper">
                <div class="front">
                    <div class="card-pattern"></div>
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <span style="font-family:'Lilita One'; font-size:24px; color:#F2E3A4">BRUNA</span>
                        <div style="text-align:right">
                            <div id="uiNombre" style="font-weight:700; font-size:16px;">...</div>
                            <div id="uiID" style="font-size:10px; opacity:0.6; font-family:monospace;">ID: ...</div>
                        </div>
                    </div>

                    <div class="stamps-grid" id="gridSellos"></div>

                    <div class="points-badge" style="display:flex; justify-content:space-between; align-items:center;">
                        <div style="text-align:left">
                            <div style="font-size:9px; text-transform:uppercase; letter-spacing:1px; opacity:0.8;">Tazas consumidas</div>
                            <div class="points-number"><span id="uiPuntos">0</span><small style="font-size:14px; opacity:0.5;">/10</small></div>
                        </div>
                        <div id="uiPremio" style="font-size:11px; font-weight:700; padding:8px 12px; border-radius:12px; background:rgba(255,255,255,0.05);">...</div>
                    </div>

                    <div style="margin-top:30px; display:flex; flex-direction:column; align-items:center;">
                        <div style="background:white; padding:10px; border-radius:15px; box-shadow:0 10px 20px rgba(0,0,0,0.2);">
                            <img id="uiQR" src="" style="width:100px; height:100px; display:block;">
                        </div>
                        <span style="font-size:9px; margin-top:10px; opacity:0.5; letter-spacing:2px;">CÓDIGO ÚNICO DE CLIENTE</span>
                    </div>
                </div>

                <div class="back">
                    <div style="width:160px; height:160px; background:#F2E3A4; border-radius:50%; display:flex; justify-content:center; align-items:center; box-shadow:0 20px 40px rgba(0,0,0,0.3);">
                        <span style="font-family:'Lilita One'; font-size:60px; color:#35251A">B</span>
                    </div>
                    <div style="color:#F2E3A4; font-family:monospace; letter-spacing:6px; margin-top:20px; font-size:14px;">BAKERY</div>
                </div>
            </div>
        </div>
        <button onclick="cerrarSesion()" class="btn-link" style="width:100%">Cerrar sesión en este dispositivo</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCaqJraAXeZ8F4zCd9GUIdNIHhfU7FMzJk",
            authDomain: "club-cafe-app.firebaseapp.com",
            projectId: "club-cafe-app",
            storageBucket: "club-cafe-app.firebasestorage.app",
            messagingSenderId: "1007849307452",
            appId: "1:1007849307452:web:2472f6b2cab7deeae53239"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- LÓGICA DE INTERFAZ ---
        function alertar(msg) {
            document.getElementById('modalTexto').innerText = msg;
            document.getElementById('modalAlerta').style.display = 'flex';
        }

        function formatName(str) {
            return str.trim().toLowerCase().replace(/\b\w/g, l => l.toUpperCase());
        }

        const btnReg = document.getElementById('btnRegistrar');
        btnReg.onclick = async () => {
            const nombre = formatName(document.getElementById('inputNombre').value);
            const email = document.getElementById('inputEmail').value.trim().toLowerCase();

            if(!nombre || !email.includes('@')) return alertar("Ingresa un nombre y un email válido.");

            const id = email.replace(/[.#$[\]]/g, "_");
            localStorage.setItem('bruna_id', id);

            await setDoc(doc(db, "clientes", id), {
                nombre: nombre,
                email: email,
                puntos: 0,
                fecha: new Date().toISOString()
            }, { merge: true });

            location.reload();
        };

        function iniciar() {
            const id = localStorage.getItem('bruna_id');
            document.getElementById('cargando').style.display = 'none';
            
            if(!id) {
                document.getElementById('pantallaRegistro').style.display = 'block';
            } else {
                document.getElementById('pantallaTarjeta').style.display = 'block';
                conectar(id);
            }
        }

        function conectar(id) {
            onSnapshot(doc(db, "clientes", id), (snap) => {
                if(snap.exists()) {
                    const d = snap.data();
                    document.getElementById('uiNombre').innerText = d.nombre;
                    document.getElementById('uiID').innerText = `ID: ${id.slice(0,10)}...`;
                    document.getElementById('uiPuntos').innerText = d.puntos;
                    document.getElementById('uiQR').src = `https://api.qrserver.com/v1/create-qr-code/?data=${id}&size=150x150&color=35251A&bgcolor=FFFFFF`;
                    
                    renderTazas(d.puntos);
                    document.getElementById('uiPremio').innerText = d.puntos >= 10 ? "🎁 BEBIDA LISTA" : "☕ EN PROGRESO";
                }
            });
        }

        function renderTazas(p) {
            const grid = document.getElementById('gridSellos');
            grid.innerHTML = '';
            for(let i=1; i<=10; i++) {
                const cup = document.createElement('div');
                cup.className = i <= p ? 'filled' : '';
                cup.innerHTML = `<svg class="stamp-cup" viewBox="0 0 100 100"><path d="M20,35 H80 V75 Q80,90 65,90 H35 Q20,90 20,75 Z" /></svg>`;
                grid.appendChild(cup);
            }
        }

        window.cerrarSesion = () => {
            localStorage.removeItem('bruna_id');
            location.reload();
        };

        iniciar();
    </script>

    <script>
        // Lógica PWA sutil
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('btnPWA').style.display = 'block';
        });

        document.getElementById('btnPWA').onclick = async () => {
            if(deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if(outcome === 'accepted') document.getElementById('btnPWA').style.display = 'none';
            }
        };
    </script>
</body>
</html>
