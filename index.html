<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BRUNA - Tarjeta de Fidelización</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#35251A">
    <link rel="apple-touch-icon" href="icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Paleta BRUNA */
            --bg-warm: #F8F4E6;
            --card-white: #FDFAF0;
            --brand-dark: #35251A;
            --brand-gradient: linear-gradient(135deg, #3A2A1E 0%, #1A110A 100%);
            --brand-light: #F2E3A4;
            --text-main: #35251A;
            --text-secondary: #8C7A6B;
            --border-warm: #E6DED5;
            
            /* Colores Tazas */
            --cup-empty-border: rgba(242, 227, 164, 0.25);
            --cup-filled-coffee: #35251A;
            --cup-filled-steam: #FFFFFF;
            --cup-marked-bg: #F2E3A4;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-warm);
            margin: 0; padding: 20px;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; color: var(--text-main);
        }

        /* --- PANTALLA 1: REGISTRO --- */
        #pantallaRegistro {
            text-align: center; width: 100%; max-width: 360px; display: none;
            background-color: var(--card-white); padding: 40px 30px;
            border-radius: 28px; box-shadow: 0 10px 30px rgba(53, 37, 26, 0.08);
            border: 1px solid rgba(230, 222, 213, 0.5);
        }
        #pantallaRegistro h2 { font-family: 'Lilita One', cursive; color: var(--brand-dark); margin-top: 0; font-size: 32px; letter-spacing: 1px;}
        #pantallaRegistro p { color: var(--text-secondary); font-size: 14px; margin-bottom: 30px;}
        
        .input-group { margin-bottom: 15px; text-align: left;}
        .input-group label { font-size: 12px; color: var(--text-secondary); font-weight: 600; margin-left: 5px; display: block; margin-bottom: 5px;}
        
        .input-box {
            width: 100%; padding: 18px; border-radius: 14px; border: 1.5px solid var(--border-warm);
            font-size: 16px; box-sizing: border-box; font-family: 'Poppins', sans-serif;
            background-color: #FFFDF7; transition: border-color 0.2s;
        }
        .input-box:focus { border-color: var(--brand-dark); outline: none; background-color: #fff;}
        
        .btn-crear {
            background: var(--brand-gradient); color: var(--brand-light); border: none;
            padding: 18px; width: 100%; border-radius: 18px; font-size: 16px;
            font-weight: 600; cursor: pointer; margin-top: 20px; font-family: 'Poppins', sans-serif;
            box-shadow: 0 8px 20px rgba(53, 37, 26, 0.25); transition: transform 0.1s;
        }
        .btn-crear:active { transform: scale(0.97); }

        /* --- PANTALLA 2: TARJETA DIGITAL --- */
        .flip-container {
            perspective: 1000px; width: 100%; max-width: 360px; margin: 0 auto; cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .flip-container.flipped .flipper { transform: rotateY(180deg); }
        
        .flipper {
            display: grid; transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            transform-style: preserve-3d; width: 100%;
        }
        
        .front, .back {
            grid-area: 1 / 1; backface-visibility: hidden; -webkit-backface-visibility: hidden;
            border-radius: 28px; width: 100%; height: 100%;
        }
        
        .front { transform: rotateY(0deg); }
        
        /* DORSO TARJETA */
        /* DORSO TARJETA CON PATRÓN SUTIL DE CAFETERÍA */
        .back {
            transform: rotateY(180deg); 
            background: 
                url("data:image/svg+xml,%3Csvg width='120' height='120' viewBox='0 0 120 120' xmlns='http://www.w3.org/2000/svg'%3E%3Ctext x='15' y='45' font-family='sans-serif' font-weight='bold' font-size='35' fill='%23F2E3A4' fill-opacity='0.04'%3EB%3C/text%3E%3Cg stroke='%23F2E3A4' stroke-opacity='0.04' stroke-width='2' fill='none'%3E%3Cpath d='M70,20 H90 V30 Q90,38 80,38 H70 Z' /%3E%3Cpath d='M90,23 Q96,23 96,28 T90,32' /%3E%3Cline x1='75' y1='15' x2='75' y2='10' stroke-linecap='round'/%3E%3Cline x1='85' y1='15' x2='85' y2='10' stroke-linecap='round'/%3E%3C/g%3E%3Cg stroke='%23F2E3A4' stroke-opacity='0.04' stroke-width='2' fill='none'%3E%3Cellipse cx='40' cy='90' rx='10' ry='15' transform='rotate(-30 40 90)' /%3E%3Cpath d='M35,80 Q40,90 45,100' stroke-linecap='round'/%3E%3C/g%3E%3Ccircle cx='100' cy='90' r='1.5' fill='%23F2E3A4' fill-opacity='0.04' /%3E%3Ccircle cx='20' cy='110' r='1.5' fill='%23F2E3A4' fill-opacity='0.04' /%3E%3Ccircle cx='60' cy='60' r='1.5' fill='%23F2E3A4' fill-opacity='0.04' /%3E%3C/svg%3E"),
                var(--brand-gradient);
            box-shadow: 0 15px 40px rgba(53, 37, 26, 0.4);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            border: 1px solid rgba(242, 227, 164, 0.1);
        }
        .bruna-circle {
            background-color: var(--brand-light); width: 190px; height: 190px;
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); margin-bottom: 20px;
        }
        .back-logo-text { font-family: 'Lilita One', cursive; color: var(--brand-dark); font-size: 48px; line-height: 1; margin: 0; letter-spacing: 1px;}
        .back-subtitle { color: var(--brand-light); font-family: monospace; font-size: 14px; opacity: 0.6; letter-spacing: 4px; margin-top: 15px;}

        @keyframes titilar { 0% {opacity:0.4;} 50% {opacity:1;} 100% {opacity:0.4;} }
        .texto-girar { text-align: center; font-size: 12px; color: var(--text-secondary); margin-bottom: 15px; font-weight: 600; animation: titilar 2s infinite; }

        #pantallaTarjeta { width: 100%; max-width: 360px; display: none; }
        
        .wallet-card {
            background: var(--brand-gradient); border-radius: 28px; overflow: hidden;
            box-shadow: 0 15px 40px rgba(53, 37, 26, 0.4);
            display: flex; flex-direction: column; color: var(--brand-light);
            padding: 25px; box-sizing: border-box; border: 1px solid rgba(242, 227, 164, 0.1);
        }
        
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .logo { font-family: 'Lilita One', cursive; font-size: 26px; letter-spacing: 1px; color: var(--brand-light); line-height: 1;}
        .user-nickname { font-size: 15px; font-weight: 600; color: #fff; text-align: right;}
        .user-tel-label { display: block; font-size: 10px; opacity: 0.7; text-transform: uppercase; font-family: monospace; text-align: right;}

        .stamps-container {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            padding: 20px; border-radius: 20px; border: 1px solid rgba(242, 227, 164, 0.15); margin-bottom: 20px;
        }
        .stamps-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 15px; justify-items: center;}
        
        /* --- ANIMACIONES DE LAS TAZAS --- */
        .stamp-cup { width: 45px; height: 45px; transition: all 0.3s ease; }
        .stamp-cup .cup-path { fill: none; stroke: var(--cup-empty-border); stroke-width: 1.5; transition: all 0.3s; }
        .stamp-cup .coffee-fill { fill: none; opacity: 0; }
        .stamp-cup .steam-path { fill: none; opacity: 0; }

        @keyframes llenarCafe {
            0% { transform: translateY(10px) scale(0.9); opacity: 0; }
            100% { transform: translateY(0) scale(1); opacity: 1; }
        }
        @keyframes subirHumo {
            0% { transform: translateY(8px); opacity: 0; }
            40% { opacity: 0.6; } 
            100% { transform: translateY(-15px); opacity: 0; }
        }

        .stamp-cup.filled { transform: scale(1.08); }
        .stamp-cup.filled .cup-path { fill: var(--cup-marked-bg); stroke: var(--cup-marked-bg); }
        .stamp-cup.filled .coffee-fill { fill: var(--cup-filled-coffee); animation: llenarCafe 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .stamp-cup.filled .steam-path { stroke: var(--cup-filled-steam); stroke-width: 1.8; stroke-linecap: round; animation: subirHumo 2.8s ease-out infinite 0.4s; }

        .stamps-text { text-align: center; font-size: 11px; opacity: 0.8; margin: 0; color: #fff;}

        .info-row { display: flex; justify-content: space-between; margin-bottom: 25px; padding: 0 5px;}
        .info-label { font-size: 10px; opacity: 0.7; text-transform: uppercase; margin-bottom: 2px; font-weight: 600; color: #fff;}
        .info-value { font-weight: 700; font-size: 16px; color: #fff;}
        .info-value-points { color: var(--brand-light); font-size: 20px;}
        
        @keyframes latidoPremio {
            0% { transform: scale(1); text-shadow: 0 0 0 rgba(242, 227, 164, 0); }
            50% { transform: scale(1.1); text-shadow: 0 0 10px rgba(242, 227, 164, 0.5); }
            100% { transform: scale(1); text-shadow: 0 0 0 rgba(242, 227, 164, 0); }
        }
        .premio-listo { color: var(--brand-light) !important; animation: latidoPremio 1.5s infinite; }

        .qr-section { display: flex; flex-direction: column; align-items: center; gap: 10px;}
        .qr-box { background-color: var(--brand-light); padding: 12px; border-radius: 16px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .qr-box img { display: block; width: 110px; height: 110px; mix-blend-mode: multiply; }
        .user-id { font-size: 11px; opacity: 0.7; letter-spacing: 1px; font-family: monospace; color: #fff;}
        
        .btn-cerrar { margin-top: 30px; background: none; color: var(--text-secondary); border: none; width: 100%; text-decoration: underline; font-family: 'Poppins', sans-serif; font-size: 13px; cursor: pointer;}
        #cargando { font-size: 16px; text-align: center; color: var(--text-secondary); font-weight: 600;}

        /* --- MODAL ALERTA PERSONALIZADO --- */
        .custom-modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(53, 37, 26, 0.6); backdrop-filter: blur(4px);
            z-index: 3000; display: none; align-items: center; justify-content: center;
            padding: 20px; box-sizing: border-box;
        }
        .custom-modal-box {
            background: var(--card-white); border-radius: 24px; padding: 30px 20px;
            width: 100%; max-width: 320px; text-align: center;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2); border: 1px solid var(--border-warm);
        }
        .custom-modal-text { color: var(--brand-dark); font-size: 16px; margin-bottom: 25px; font-weight: 600; font-family: 'Poppins', sans-serif;}
        .btn-modal-ok { width: 100%; background: var(--brand-dark); color: var(--brand-light); border: none; padding: 14px; border-radius: 16px; font-weight: 600; font-family: 'Poppins', sans-serif; cursor: pointer; }
    </style>
</head>
<body>

    <div id="modalAlertaCustom" class="custom-modal-overlay">
        <div class="custom-modal-box">
            <div id="textoAlertaCustom" class="custom-modal-text">Mensaje de error</div>
            <button id="btnCerrarAlerta" class="btn-modal-ok">Entendido</button>
        </div>
    </div>

    <div id="cargando">Abriendo Bruna...</div>

    <div id="pantallaRegistro">
        <h2>BRUNA</h2>
        <p>Completa tus datos para obtener tu tarjeta digital.</p>
        
        <div class="input-group">
            <label>Tu Apodo / Nombre</label>
            <input type="text" id="inputNombre" class="input-box" placeholder="Ej: Simon" required>
        </div>
        
        <div class="input-group">
            <label>Tu número de WhatsApp</label>
            <input type="tel" id="inputCelular" class="input-box" placeholder="Ej: 2215551234" required>
        </div>
        
        <button class="btn-crear" id="btnCrearTarjeta">Crear / Cargar Tarjeta</button>

        <button id="btnInstalarApp" class="btn-cerrar" style="display: none; margin-top: 20px;">
            ⬇️ Instalar BRUNA en el inicio
        </button>
    </div>

    <div id="pantallaTarjeta">
        <p class="texto-girar">👉 Toca la tarjeta para girarla</p>
        
        <div class="flip-container" onclick="this.classList.toggle('flipped')">
            <div class="flipper">
                <div class="front">
                    <div class="wallet-card" style="margin: 0; height: 100%;">
                        <div class="card-header">
                            <div class="logo">BRUNA</div>
                            <div>
                                <div class="user-nickname" id="displayNombre">...</div>
                                <span class="user-tel-label" id="displayTelLabel">******0000</span>
                            </div>
                        </div>
                        <div class="stamps-container">
                            <div class="stamps-grid" id="gridSellos"></div>
                            <p class="stamps-text">Completa 10 tazas y recibe una bebida de regalo.</p>
                        </div>
                        <div class="info-row">
                            <div>
                                <div class="info-label">Estado Premio 🎁</div>
                                <div class="info-value" id="displayPremio">...</div>
                            </div>
                            <div style="text-align: right;">
                                <div class="info-label">Tazas Servidas</div>
                                <div class="info-value info-value-points"><span id="displayPuntos">0</span>/10</div>
                            </div>
                        </div>
                        <div class="qr-section">
                            <div class="qr-box"><img id="qrImage" src="" alt="QR Cliente"></div>
                            <div class="user-id">ID ÚNICO DE CLIENTE</div>
                        </div>
                    </div>
                </div>
                <div class="back">
                    <div class="bruna-circle"><h2 class="back-logo-text">BRUNA</h2></div>
                    <div class="back-subtitle">BAKERY</div>
                </div>
            </div>
        </div>
        
        <button id="btnCerrarSesion" class="btn-cerrar">Cerrar sesión en este dispositivo</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        class BrunaApp {
            constructor() {
                const firebaseConfig = {
                    apiKey: "AIzaSyCaqJraAXeZ8F4zCd9GUIdNIHhfU7FMzJk",
                    authDomain: "club-cafe-app.firebaseapp.com",
                    databaseURL: "https://club-cafe-app-default-rtdb.firebaseio.com",
                    projectId: "club-cafe-app",
                    storageBucket: "club-cafe-app.firebasestorage.app",
                    messagingSenderId: "1007849307452",
                    appId: "1:1007849307452:web:2472f6b2cab7deeae53239",
                    measurementId: "G-6314S7TS0T"
                };
                
                this.app = initializeApp(firebaseConfig);
                this.db = getFirestore(this.app);
                this.unsubscribe = null;

                this.ui = {
                    cargando: document.getElementById('cargando'),
                    registro: document.getElementById('pantallaRegistro'),
                    tarjeta: document.getElementById('pantallaTarjeta'),
                    nombre: document.getElementById('displayNombre'),
                    telLabel: document.getElementById('displayTelLabel'),
                    qr: document.getElementById('qrImage'),
                    gridSellos: document.getElementById('gridSellos'),
                    puntos: document.getElementById('displayPuntos'),
                    premio: document.getElementById('displayPremio'),
                    // Elementos del Modal
                    modalAlerta: document.getElementById('modalAlertaCustom'),
                    textoAlerta: document.getElementById('textoAlertaCustom')
                };

                this.vincularEventos();
                this.iniciar();
            }

            vincularEventos() {
                document.getElementById('btnCrearTarjeta').addEventListener('click', () => this.ingresar());
                document.getElementById('btnCerrarSesion').addEventListener('click', () => this.cerrarSesion());
                
                // Cerrar el modal al hacer clic en "Entendido"
                document.getElementById('btnCerrarAlerta').addEventListener('click', () => {
                    this.ui.modalAlerta.style.display = 'none';
                });
            }

            // NUEVA FUNCIÓN: Mostrar Alertas Elegantes
            mostrarAlerta(mensaje) {
                this.ui.textoAlerta.innerText = mensaje;
                this.ui.modalAlerta.style.display = 'flex';
            }

            iniciar() {
                const celularLocal = localStorage.getItem('miTarjetaCafeTEL');
                if (celularLocal) {
                    this.abrirTarjeta(celularLocal);
                } else {
                    this.cambiarPantalla('registro');
                }
            }

            cambiarPantalla(pantalla) {
                this.ui.cargando.style.display = pantalla === 'cargando' ? 'block' : 'none';
                this.ui.registro.style.display = pantalla === 'registro' ? 'block' : 'none';
                this.ui.tarjeta.style.display = pantalla === 'tarjeta' ? 'block' : 'none';
            }

            // NUEVA FUNCIÓN: Formatear nombre (Primera en Mayúscula, resto minúscula)
            formatearNombre(texto) {
                if (!texto) return "";
                return texto.trim().toLowerCase().replace(/\b\w/g, letra => letra.toUpperCase());
            }

            async ingresar() {
                const nombreIngresado = document.getElementById('inputNombre').value;
                const nombre = this.formatearNombre(nombreIngresado); // Aplicamos el formato aquí
                let celular = document.getElementById('inputCelular').value.trim();

                if(!nombre || !celular) return this.mostrarAlerta("Por favor completa tu nombre y número para continuar.");
                
                celular = celular.replace(/\D/g,''); 
                if(celular.length < 8) return this.mostrarAlerta("El número de WhatsApp es demasiado corto. Revisa que esté bien escrito.");

                this.cambiarPantalla('cargando');
                this.ui.cargando.innerText = "Sincronizando tarjeta...";

                try {
                    const docRef = doc(this.db, "clientes", celular);
                    const docSnap = await getDoc(docRef);

                    if (docSnap.exists()) {
                        await setDoc(docRef, { nombre: nombre }, { merge: true });
                    } else {
                        await setDoc(docRef, { 
                            nombre: nombre, 
                            puntos: 0,
                            fechaRegistro: new Date().toISOString()
                        });
                    }
                    
                    localStorage.setItem('miTarjetaCafeTEL', celular);
                    this.abrirTarjeta(celular);
                } catch (e) {
                    console.error("Error:", e);
                    this.mostrarAlerta("Hubo un error de conexión. Revisa tu internet e intenta de nuevo.");
                    this.cambiarPantalla('registro');
                }
            }

            abrirTarjeta(celular) {
                this.cambiarPantalla('tarjeta');
                
                this.ui.qr.src = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${celular}&bgcolor=F2E3A4&color=35251A`;
                this.ui.telLabel.innerText = `******${celular.slice(-4)}`;

                this.unsubscribe = onSnapshot(doc(this.db, "clientes", celular), (docSnap) => {
                    if (docSnap.exists()) {
                        const datos = docSnap.data();
                        this.ui.nombre.innerText = datos.nombre; // Ahora siempre se verá bien (Ej: Simon)
                        this.renderizarTazas(datos.puntos);
                    } else {
                        this.cerrarSesion(); 
                    }
                });
            }

            renderizarTazas(puntosActuales) {
                const totalTazas = 10;
                this.ui.gridSellos.innerHTML = ''; 

                for (let i = 1; i <= totalTazas; i++) {
                    const contenedorSvg = document.createElement('div');
                    contenedorSvg.innerHTML = this.obtenerSvgTaza();
                    const svgElement = contenedorSvg.querySelector('svg'); 
                    
                    if (i <= puntosActuales) {
                        svgElement.classList.add('filled');
                    }
                    this.ui.gridSellos.appendChild(svgElement);
                }

                this.ui.puntos.innerText = puntosActuales;
                
                if(puntosActuales >= totalTazas) {
                    this.ui.premio.innerText = "¡BEBIDA LISTA!";
                    this.ui.premio.classList.add('premio-listo');
                } else {
                    this.ui.premio.innerText = "Aún sin premios";
                    this.ui.premio.classList.remove('premio-listo');
                    this.ui.premio.style.fontWeight = "400";
                }
            }

            obtenerSvgTaza() {
                return `
                <svg class="stamp-cup" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <path class="steam-path" d="M38,30 V12 M50,32 V8 M62,30 V16" stroke-linecap="round"/>
                    <path class="cup-path" d="M20,35 H80 V75 Q80,90 65,90 H35 Q20,90 20,75 Z" />
                    <path class="coffee-fill" d="M22,37 H78 V73 Q78,88 63,88 H37 Q22,88 22,73 Z" />
                    <path class="cup-path" d="M80,45 Q95,45 95,60 T80,75" />
                </svg>`;
            }

            cerrarSesion() {
                if (this.unsubscribe) this.unsubscribe(); 
                localStorage.removeItem('miTarjetaCafeTEL');
                location.reload();
            }
        }

        window.onload = () => {
            new BrunaApp();
        };
    </script>
    
    <script>
        let eventoInstalacion = null;
        const btnInstalar = document.getElementById('btnInstalarApp');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault(); 
            eventoInstalacion = e;
            btnInstalar.style.display = 'block'; 
        });

        btnInstalar.addEventListener('click', async () => {
            if (!eventoInstalacion) return;
            
            eventoInstalacion.prompt(); 
            
            const { outcome } = await eventoInstalacion.userChoice;
            if (outcome === 'accepted') {
                btnInstalar.style.display = 'none'; 
            }
            eventoInstalacion = null;
        });

        window.addEventListener('appinstalled', () => {
            btnInstalar.style.display = 'none';
        });
    </script>
</body>
</html>
