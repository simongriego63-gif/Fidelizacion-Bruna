<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BRUNA - Tarjeta de Fidelización</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#35251A">
    <link rel="apple-touch-icon" href="icon.png">
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Paleta BRUNA (Marrón intenso y Crema/Amarillo claro) */
            --bg-warm: #F8F4E6; /* Fondo beige muy sutil */
            --card-white: #ffffff;
            
            --brand-dark: #35251A; /* Marrón oscuro del logo */
            --brand-gradient: linear-gradient(135deg, #3A2A1E 0%, #1A110A 100%);
            --brand-light: #F2E3A4; /* Amarillo pastel/crema del círculo de Instagram */
            
            --text-main: #35251A;
            --text-on-dark: #F2E3A4;
            --text-secondary: #8C7A6B;
            --border-warm: #E6DED5;
            
            /* Colores para las tazas */
            --cup-empty-border: rgba(242, 227, 164, 0.25); /* Borde sutil taza vacía en crema */
            --cup-filled-coffee: #35251A; /* Color café oscuro */
            --cup-filled-steam: #FFFFFF; /* Humo blanco */
            --cup-marked-bg: #F2E3A4; /* Fondo taza marcada (Amarillo crema) */
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-warm);
            margin: 0; padding: 20px;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; color: var(--text-main);
        }

        /* --- PANTALLA 1: REGISTRO --- */
        #pantallaRegistro {
            text-align: center; width: 100%; max-width: 360px; display: none;
            background-color: var(--card-white); padding: 40px 30px;
            border-radius: 28px; box-shadow: 0 10px 30px rgba(53, 37, 26, 0.08);
            border: 1px solid rgba(230, 222, 213, 0.5);
        }
        #pantallaRegistro h2 { 
            font-family: 'Lilita One', cursive; 
            color: var(--brand-dark); 
            margin-top: 0; 
            font-size: 32px;
            letter-spacing: 1px;
        }
        #pantallaRegistro p { color: var(--text-secondary); font-size: 14px; margin-bottom: 30px;}
        
        .input-group { margin-bottom: 15px; text-align: left;}
        .input-group label { font-size: 12px; color: var(--text-secondary); font-weight: 600; margin-left: 5px; display: block; margin-bottom: 5px;}
        
        .input-box {
            width: 100%; padding: 18px; border-radius: 14px; border: 1.5px solid var(--border-warm);
            font-size: 16px; box-sizing: border-box; font-family: 'Poppins', sans-serif;
            background-color: #fcfcfc; transition: border-color 0.2s;
        }
        .input-box:focus { border-color: var(--brand-dark); outline: none; background-color: #fff;}
        
        .btn-crear {
            background: var(--brand-gradient); color: var(--brand-light); border: none;
            padding: 18px; width: 100%; border-radius: 18px; font-size: 16px;
            font-weight: 600; cursor: pointer; margin-top: 20px; font-family: 'Poppins', sans-serif;
            box-shadow: 0 8px 20px rgba(53, 37, 26, 0.25); transition: transform 0.1s;
        }
        .btn-crear:active { transform: scale(0.97); }

        /* --- PANTALLA 2: LA TARJETA DIGITAL BRUNA --- */
        .flip-container {
            perspective: 1000px; width: 100%; max-width: 360px; margin: 0 auto; cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .flip-container.flipped .flipper { transform: rotateY(180deg); }
        
        .flipper {
            display: grid; 
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            transform-style: preserve-3d; width: 100%;
        }
        
        .front, .back {
            grid-area: 1 / 1; 
            backface-visibility: hidden; -webkit-backface-visibility: hidden;
            border-radius: 28px; width: 100%; height: 100%;
        }
        
        .front { transform: rotateY(0deg); }
        
        /* DISEÑO DEL DORSO (RÉPLICA INSTAGRAM BRUNA) */
        .back {
            transform: rotateY(180deg);
            background: var(--brand-gradient);
            box-shadow: 0 15px 40px rgba(53, 37, 26, 0.4);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            border: 1px solid rgba(242, 227, 164, 0.1);
        }
        
        /* Círculo crema con texto marrón */
        .bruna-circle {
            background-color: var(--brand-light);
            width: 190px;
            height: 190px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }

        .back-logo-text { 
            font-family: 'Lilita One', cursive; 
            color: var(--brand-dark); 
            font-size: 48px; 
            line-height: 1; 
            margin: 0; 
            letter-spacing: 1px;
        }
        
        .back-subtitle { color: var(--brand-light); font-family: monospace; font-size: 14px; opacity: 0.6; letter-spacing: 4px; margin-top: 15px;}

        @keyframes titilar { 0% {opacity:0.4;} 50% {opacity:1;} 100% {opacity:0.4;} }
        .texto-girar { text-align: center; font-size: 12px; color: var(--text-secondary); margin-bottom: 15px; font-weight: 600; animation: titilar 2s infinite; }

        #pantallaTarjeta { width: 100%; max-width: 360px; display: none; }
        
        .wallet-card {
            background: var(--brand-gradient);
            border-radius: 28px; overflow: hidden;
            box-shadow: 0 15px 40px rgba(53, 37, 26, 0.4);
            display: flex; flex-direction: column; color: var(--text-on-dark);
            padding: 25px; box-sizing: border-box;
            border: 1px solid rgba(242, 227, 164, 0.1);
        }
        
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .logo { font-family: 'Lilita One', cursive; font-size: 26px; letter-spacing: 1px; color: var(--brand-light); line-height: 1;}
        .user-info { text-align: right; }
        .user-nickname { font-size: 15px; font-weight: 600; color: #fff;}
        .user-tel-label { display: block; font-size: 10px; opacity: 0.7; text-transform: uppercase; font-family: monospace;}

        /* Contenedor Tazas */
        .stamps-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            padding: 20px; border-radius: 20px; border: 1px solid rgba(242, 227, 164, 0.15);
            margin-bottom: 20px;
        }
        
        .stamps-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 15px; justify-items: center;}
        
        .stamp-cup { width: 45px; height: 45px; transition: all 0.3s ease; }
        
        /* Taza VACÍA */
        .stamp-cup .cup-path { fill: none; stroke: var(--cup-empty-border); stroke-width: 1.5; transition: all 0.3s; }
        .stamp-cup .steam-path { fill: none; stroke: none; transition: all 0.3s; }
        .stamp-cup .coffee-fill { fill: none; transition: all 0.3s; }

        /* Taza LLENA */
        .stamp-cup.filled { transform: scale(1.08); }
        .stamp-cup.filled .cup-path { fill: var(--cup-marked-bg); stroke: var(--cup-marked-bg); }
        .stamp-cup.filled .coffee-fill { fill: var(--cup-filled-coffee); }
        .stamp-cup.filled .steam-path { fill: none; stroke: var(--cup-filled-steam); stroke-width: 1.5; stroke-linecap: round; }

        .stamps-text { text-align: center; font-size: 11px; opacity: 0.8; margin: 0; font-weight: 400;}

        .info-row { display: flex; justify-content: space-between; margin-bottom: 25px; padding: 0 5px;}
        .info-group { text-align: left; }
        .info-group.right { text-align: right; }
        .info-label { font-size: 10px; opacity: 0.7; text-transform: uppercase; margin-bottom: 2px; font-weight: 600;}
        .info-value { font-weight: 700; font-size: 16px; color: #fff;}
        .info-value-points { color: var(--brand-light); font-size: 20px;} /* Puntos en amarillo crema */

        .qr-section { display: flex; flex-direction: column; align-items: center; gap: 10px;}
        .qr-box { background-color: var(--brand-light); padding: 12px; border-radius: 16px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .qr-box img { display: block; width: 110px; height: 110px; mix-blend-mode: multiply; } /* Para que el QR se integre al crema */
        .user-id { font-size: 11px; opacity: 0.7; letter-spacing: 1px; font-family: monospace; }
        
        .btn-cerrar { margin-top: 30px; background: none; color: var(--text-secondary); border: none; width: 100%; text-decoration: underline; font-family: 'Poppins', sans-serif; font-size: 13px; cursor: pointer;}
        
        #cargando { font-size: 16px; text-align: center; color: var(--text-secondary); font-weight: 600;}
    </style>
</head>
<body>

    <div id="cargando">Abriendo Bruna...</div>

    <div id="pantallaRegistro">
        <h2>BRUNA</h2>
        <p>Completa tus datos para obtener tu tarjeta digital.</p>
        
        <div class="input-group">
            <label>Tu Apodo / Nombre</label>
            <input type="text" id="inputNombre" class="input-box" placeholder="Ej: Simon" required>
        </div>
        
        <div class="input-group">
            <label>Tu número de WhatsApp</label>
            <input type="tel" id="inputCelular" class="input-box" placeholder="Ej: 2215551234" required>
        </div>
        
        <button class="btn-crear" onclick="ingresarTarjeta()">Crear / Cargar Tarjeta</button>
    </div>

    <div id="pantallaTarjeta">
        <p class="texto-girar">👉 Toca la tarjeta para girarla</p>
        
        <div class="flip-container" onclick="this.classList.toggle('flipped')">
            <div class="flipper">
                
                <div class="front">
                    <div class="wallet-card" style="margin: 0; height: 100%;">
                        <div class="card-header">
                            <div class="logo">BRUNA</div>
                            <div class="user-info">
                                <div class="user-nickname" id="displayNombre">...</div>
                                <span class="user-tel-label" id="displayTelLabel">******0000</span>
                            </div>
                        </div>
                        
                        <div class="stamps-container">
                            <div class="stamps-grid" id="gridSellos"></div>
                            <p class="stamps-text">Completa 10 tazas y recibe una bebida de regalo.</p>
                        </div>
                        
                        <div class="info-row">
                            <div class="info-group">
                                <div class="info-label">Estado Premio 🎁</div>
                                <div class="info-value" id="displayPremio">...</div>
                            </div>
                            <div class="info-group right">
                                <div class="info-label">Tazas Servidas</div>
                                <div class="info-value info-value-points"><span id="displayPuntos">0</span>/10</div>
                            </div>
                        </div>
                        
                        <div class="qr-section">
                            <div class="qr-box">
                                <img id="qrImage" src="" alt="QR Cliente">
                            </div>
                            <div class="user-id">ID ÚNICO DE CLIENTE</div>
                        </div>
                    </div>
                </div>

                <div class="back">
                    <div class="bruna-circle">
                        <h2 class="back-logo-text">BRUNA</h2>
                    </div>
                    <div class="back-subtitle">BAKERY</div>
                </div>

            </div>
        </div>
        
        <button onclick="cerrarSesion()" class="btn-cerrar">Cerrar sesión en este dispositivo</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCaqJraAXeZ8F4zCd9GUIdNIHhfU7FMzJk",
            authDomain: "club-cafe-app.firebaseapp.com",
            databaseURL: "https://club-cafe-app-default-rtdb.firebaseio.com",
            projectId: "club-cafe-app",
            storageBucket: "club-cafe-app.firebasestorage.app",
            messagingSenderId: "1007849307452",
            appId: "1:1007849307452:web:2472f6b2cab7deeae53239",
            measurementId: "G-6314S7TS0T"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const uiCargando = document.getElementById('cargando');
        const uiRegistro = document.getElementById('pantallaRegistro');
        const uiTarjeta = document.getElementById('pantallaTarjeta');

        let celularLocal = localStorage.getItem('miTarjetaCafeTEL');

        if (celularLocal) {
            abrirTarjeta(celularLocal);
        } else {
            uiCargando.style.display = 'none';
            uiRegistro.style.display = 'block';
        }

        window.ingresarTarjeta = async function() {
            const nombre = document.getElementById('inputNombre').value.trim();
            let celular = document.getElementById('inputCelular').value.trim();

            if(!nombre || !celular) return alert("Por favor completa ambos datos");

            celular = celular.replace(/\D/g,''); 
            if(celular.length < 8) return alert("Ingresa un número de celular válido");

            uiRegistro.style.display = 'none';
            uiCargando.style.display = 'block';
            uiCargando.innerText = "Sincronizando tarjeta...";

            try {
                const docRef = doc(db, "clientes", celular);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    await setDoc(docRef, { nombre: nombre }, { merge: true });
                } else {
                    const fechaAutomatica = new Date().toISOString();
                    await setDoc(docRef, { 
                        nombre: nombre, 
                        puntos: 0,
                        fechaRegistro: fechaAutomatica
                    });
                }
                
                localStorage.setItem('miTarjetaCafeTEL', celular);
                abrirTarjeta(celular);
            } catch (e) {
                console.error("Error:", e);
                alert("Hubo un error de conexión.");
                uiCargando.style.display = 'none';
                uiRegistro.style.display = 'block';
            }
        }

        function abrirTarjeta(celular) {
            uiCargando.style.display = 'none';
            uiRegistro.style.display = 'none';
            uiTarjeta.style.display = 'block';

            // QR con color de fondo adaptado para que lea bien sobre amarillo (generado con margen blanco integrado)
            document.getElementById('qrImage').src = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${celular}&bgcolor=F2E3A4&color=35251A`;
            
            let ultimos4 = celular.slice(-4);
            document.getElementById('displayTelLabel').innerText = `******${ultimos4}`;

            onSnapshot(doc(db, "clientes", celular), (docSnap) => {
                if (docSnap.exists()) {
                    const datos = docSnap.data();
                    document.getElementById('displayNombre').innerText = datos.nombre;
                    renderizarTazas(datos.puntos);
                } else {
                    cerrarSesion(); 
                }
            });
        }

        function renderizarTazas(puntosActuales) {
            const totalTazas = 10;
            const grid = document.getElementById('gridSellos');
            grid.innerHTML = ''; 

            for (let i = 1; i <= totalTazas; i++) {
                const contenedorSvg = document.createElement('div');
                contenedorSvg.innerHTML = obtenerSvgTaza();
                
                const svgElement = contenedorSvg.querySelector('svg'); 
                
                if (i <= puntosActuales) {
                    svgElement.classList.add('filled');
                }
                
                grid.appendChild(svgElement);
            }

            document.getElementById('displayPuntos').innerText = puntosActuales;
            
            const uiPremio = document.getElementById('displayPremio');
            if(puntosActuales >= totalTazas) {
                uiPremio.innerText = "¡BEBIDA LISTA!";
                uiPremio.style.color = "var(--brand-light)";
                uiPremio.style.fontWeight = "700";
            } else {
                uiPremio.innerText = "Aún sin premios";
                uiPremio.style.color = "#ffffff";
                uiPremio.style.fontWeight = "400";
            }
        }

        function obtenerSvgTaza() {
            return `
            <svg class="stamp-cup" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <path class="steam-path" d="M35,15 Q40,5 45,15 T55,15 M55,20 Q60,10 65,20 T75,20" />
                <path class="cup-path" d="M20,35 H80 V75 Q80,90 65,90 H35 Q20,90 20,75 Z" />
                <path class="coffee-fill" d="M22,37 H78 V73 Q78,88 63,88 H37 Q22,88 22,73 Z" />
                <path class="cup-path" d="M80,45 Q95,45 95,60 T80,75" />
            </svg>
            `;
        }

        window.cerrarSesion = function() {
            localStorage.removeItem('miTarjetaCafeTEL');
            location.reload();
        }
    </script>
</body>
</html>
