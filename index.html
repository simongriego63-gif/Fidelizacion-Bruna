<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BRUNA - El Arte del Grano</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#3C2A21">
    <link rel="apple-touch-icon" href="icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Paleta BRUNA Premium - Industrial Chic */
            --bg-deep: #3C2A21;
            --bg-deep-darker: #2D1F18;
            --surface-cream: #E5E0DA;
            --surface-cream-soft: rgba(229, 224, 218, 0.08);
            --accent-bronze: #B09B71;
            --accent-bronze-glow: rgba(176, 155, 113, 0.4);
            --text-white: #FFFFFF;
            --text-white-soft: rgba(255, 255, 255, 0.7);
            --text-dark: #3C2A21;
            
            /* Sombras Neumorficas */
            --shadow-soft: 0 8px 32px rgba(0, 0, 0, 0.25);
            --shadow-elevated: 0 20px 60px rgba(0, 0, 0, 0.35);
            --shadow-inner: inset 0 2px 8px rgba(0, 0, 0, 0.15);
            --shadow-bronze-glow: 0 0 30px rgba(176, 155, 113, 0.3);
            
            /* Transiciones */
            --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
            --ease-bounce: cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-deep);
            background-image: 
                radial-gradient(ellipse at 20% 0%, rgba(176, 155, 113, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 100%, rgba(176, 155, 113, 0.05) 0%, transparent 50%);
            margin: 0;
            padding: 40px 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-white);
        }

        /* --- PANTALLA 1: REGISTRO PREMIUM --- */
        #pantallaRegistro {
            text-align: center;
            width: 100%;
            max-width: 400px;
            display: none;
            background: linear-gradient(145deg, var(--bg-deep-darker), var(--bg-deep));
            padding: 56px 40px;
            border-radius: 32px;
            box-shadow: var(--shadow-elevated), var(--shadow-inner);
            border: 1px solid rgba(176, 155, 113, 0.15);
            position: relative;
            overflow: hidden;
        }

        #pantallaRegistro::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent-bronze), transparent);
            opacity: 0.5;
        }

        #pantallaRegistro h2 {
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            color: var(--text-white);
            margin: 0 0 8px 0;
            font-size: 42px;
            letter-spacing: 6px;
            text-transform: uppercase;
        }

        #pantallaRegistro .subtitle {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            color: var(--accent-bronze);
            font-size: 16px;
            margin-bottom: 48px;
            font-weight: 400;
            letter-spacing: 2px;
        }

        .input-group {
            margin-bottom: 24px;
            text-align: left;
        }

        .input-group label {
            font-size: 11px;
            color: var(--text-white-soft);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-left: 4px;
            display: block;
            margin-bottom: 12px;
        }

        .input-box {
            width: 100%;
            padding: 20px 24px;
            border-radius: 16px;
            border: 1.5px solid rgba(176, 155, 113, 0.2);
            font-size: 16px;
            font-family: 'Montserrat', sans-serif;
            background: rgba(0, 0, 0, 0.2);
            color: var(--text-white);
            transition: all 0.3s var(--ease-smooth);
        }

        .input-box::placeholder {
            color: var(--text-white-soft);
            opacity: 0.5;
        }

        .input-box:focus {
            border-color: var(--accent-bronze);
            outline: none;
            background: rgba(0, 0, 0, 0.3);
            box-shadow: 0 0 0 4px var(--accent-bronze-glow);
        }

        .btn-crear {
            background: linear-gradient(135deg, var(--accent-bronze), #8B7A5A);
            color: var(--text-white);
            border: none;
            padding: 22px 32px;
            width: 100%;
            border-radius: 16px;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            cursor: pointer;
            margin-top: 32px;
            font-family: 'Montserrat', sans-serif;
            box-shadow: var(--shadow-soft);
            transition: all 0.4s var(--ease-smooth);
            position: relative;
            overflow: hidden;
        }

        .btn-crear::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s var(--ease-smooth);
        }

        .btn-crear:hover::before {
            left: 100%;
        }

        .btn-crear:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-elevated), var(--shadow-bronze-glow);
        }

        .btn-crear:active {
            transform: scale(0.98) translateY(0);
        }

        /* --- PANTALLA 2: TARJETA DIGITAL PREMIUM --- */
        .flip-container {
            perspective: 1500px;
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .flip-container.flipped .flipper {
            transform: rotateY(180deg);
        }

        .flipper {
            display: grid;
            transition: transform 1s var(--ease-bounce);
            transform-style: preserve-3d;
            width: 100%;
        }

        .front, .back {
            grid-area: 1 / 1;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            border-radius: 32px;
            width: 100%;
            height: 100%;
        }

        .front {
            transform: rotateY(0deg);
        }

        /* DORSO TARJETA PREMIUM */
        .back {
            transform: rotateY(180deg);
            background: 
                url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='40' cy='40' r='1' fill='%23B09B71' fill-opacity='0.1'/%3E%3C/svg%3E"),
                linear-gradient(145deg, var(--bg-deep-darker), var(--bg-deep));
            box-shadow: var(--shadow-elevated);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: 1px solid rgba(176, 155, 113, 0.2);
            padding: 60px;
        }

        .bruna-circle {
            background: linear-gradient(145deg, var(--surface-cream), #D4CFC9);
            width: 180px;
            height: 180px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 
                var(--shadow-elevated),
                inset 0 -4px 12px rgba(0, 0, 0, 0.1);
            margin-bottom: 32px;
            position: relative;
        }

        .bruna-circle::before {
            content: '';
            position: absolute;
            inset: -8px;
            border-radius: 50%;
            border: 1px solid rgba(176, 155, 113, 0.3);
        }

        .back-logo-text {
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            color: var(--text-dark);
            font-size: 38px;
            line-height: 1;
            margin: 0;
            letter-spacing: 4px;
        }

        .back-subtitle {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            color: var(--accent-bronze);
            font-size: 18px;
            letter-spacing: 8px;
            margin-top: 8px;
            font-weight: 400;
        }

        @keyframes pulseSubtle {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .texto-girar {
            text-align: center;
            font-size: 13px;
            color: var(--text-white-soft);
            margin-bottom: 24px;
            font-weight: 500;
            letter-spacing: 1px;
            animation: pulseSubtle 2.5s ease-in-out infinite;
        }

        #pantallaTarjeta {
            width: 100%;
            max-width: 400px;
            display: none;
        }

        .wallet-card {
            background: linear-gradient(145deg, var(--bg-deep-darker), #251A14);
            border-radius: 32px;
            overflow: hidden;
            box-shadow: var(--shadow-elevated);
            display: flex;
            flex-direction: column;
            color: var(--text-white);
            padding: 36px;
            border: 1px solid rgba(176, 155, 113, 0.15);
            position: relative;
        }

        .wallet-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent-bronze), transparent);
            opacity: 0.4;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 36px;
        }

        .logo {
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            font-size: 28px;
            letter-spacing: 4px;
            color: var(--text-white);
            line-height: 1;
        }

        .logo-tagline {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 11px;
            color: var(--accent-bronze);
            letter-spacing: 2px;
            margin-top: 4px;
            display: block;
        }

        .user-nickname {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-white);
            text-align: right;
        }

        .user-tel-label {
            display: block;
            font-size: 11px;
            color: var(--text-white-soft);
            text-transform: uppercase;
            font-family: 'Montserrat', sans-serif;
            text-align: right;
            letter-spacing: 2px;
            margin-top: 4px;
        }

        .stamps-container {
            background: var(--surface-cream-soft);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 28px;
            border-radius: 24px;
            border: 1px solid rgba(176, 155, 113, 0.15);
            margin-bottom: 28px;
        }

        .stamps-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 16px;
            margin-bottom: 20px;
            justify-items: center;
        }

        /* --- TAZAS PREMIUM --- */
        .stamp-cup {
            width: 48px;
            height: 48px;
            transition: all 0.4s var(--ease-smooth);
        }

        .stamp-cup .cup-path {
            fill: none;
            stroke: rgba(176, 155, 113, 0.3);
            stroke-width: 1.5;
            transition: all 0.4s var(--ease-smooth);
        }

        .stamp-cup .coffee-fill {
            fill: none;
            opacity: 0;
        }

        .stamp-cup .steam-path {
            fill: none;
            opacity: 0;
        }

        @keyframes fillCoffee {
            0% { transform: translateY(10px) scale(0.9); opacity: 0; }
            100% { transform: translateY(0) scale(1); opacity: 1; }
        }

        @keyframes riseSteam {
            0% { transform: translateY(8px); opacity: 0; }
            40% { opacity: 0.7; }
            100% { transform: translateY(-18px); opacity: 0; }
        }

        .stamp-cup.filled {
            transform: scale(1.1);
            filter: drop-shadow(0 4px 8px rgba(176, 155, 113, 0.3));
        }

        .stamp-cup.filled .cup-path {
            fill: var(--accent-bronze);
            stroke: var(--accent-bronze);
        }

        .stamp-cup.filled .coffee-fill {
            fill: var(--bg-deep);
            animation: fillCoffee 0.5s var(--ease-bounce) forwards;
        }

        .stamp-cup.filled .steam-path {
            stroke: var(--surface-cream);
            stroke-width: 2;
            stroke-linecap: round;
            animation: riseSteam 3s ease-out infinite 0.4s;
        }

        .stamps-text {
            text-align: center;
            font-size: 12px;
            color: var(--text-white-soft);
            margin: 0;
            font-family: 'Playfair Display', serif;
            font-style: italic;
            letter-spacing: 0.5px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 32px;
            padding: 0 8px;
        }

        .info-label {
            font-size: 10px;
            color: var(--text-white-soft);
            text-transform: uppercase;
            margin-bottom: 6px;
            font-weight: 600;
            letter-spacing: 2px;
        }

        .info-value {
            font-weight: 700;
            font-size: 16px;
            color: var(--text-white);
        }

        .info-value-points {
            color: var(--accent-bronze);
            font-size: 24px;
            font-weight: 800;
        }

        @keyframes prizeGlow {
            0%, 100% { 
                transform: scale(1); 
                text-shadow: 0 0 0 transparent;
            }
            50% { 
                transform: scale(1.05); 
                text-shadow: 0 0 20px var(--accent-bronze-glow);
            }
        }

        .premio-listo {
            color: var(--accent-bronze) !important;
            animation: prizeGlow 2s ease-in-out infinite;
        }

        .qr-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .qr-box {
            background: var(--surface-cream);
            padding: 16px;
            border-radius: 20px;
            box-shadow: var(--shadow-soft);
            position: relative;
        }

        .qr-box::before {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 24px;
            border: 1px solid rgba(176, 155, 113, 0.3);
        }

        .qr-box img {
            display: block;
            width: 120px;
            height: 120px;
            mix-blend-mode: multiply;
        }

        .user-id {
            font-size: 10px;
            color: var(--text-white-soft);
            letter-spacing: 3px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            text-transform: uppercase;
        }

        .btn-cerrar {
            margin-top: 40px;
            background: none;
            color: var(--text-white-soft);
            border: none;
            width: 100%;
            font-family: 'Montserrat', sans-serif;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            letter-spacing: 1px;
            padding: 12px;
            border-radius: 12px;
            transition: all 0.3s var(--ease-smooth);
        }

        .btn-cerrar:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-white);
        }

        #cargando {
            font-size: 14px;
            text-align: center;
            color: var(--text-white-soft);
            font-weight: 500;
            letter-spacing: 2px;
        }

        /* --- MODAL PREMIUM --- */
        .custom-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(45, 31, 24, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 3000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .custom-modal-box {
            background: linear-gradient(145deg, var(--bg-deep), var(--bg-deep-darker));
            border-radius: 28px;
            padding: 40px 32px;
            width: 100%;
            max-width: 360px;
            text-align: center;
            box-shadow: var(--shadow-elevated);
            border: 1px solid rgba(176, 155, 113, 0.2);
            position: relative;
        }

        .custom-modal-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent-bronze), transparent);
            opacity: 0.5;
        }

        .custom-modal-text {
            color: var(--text-white);
            font-size: 15px;
            margin-bottom: 32px;
            font-weight: 500;
            font-family: 'Montserrat', sans-serif;
            line-height: 1.6;
        }

        .btn-modal-ok {
            width: 100%;
            background: linear-gradient(135deg, var(--accent-bronze), #8B7A5A);
            color: var(--text-white);
            border: none;
            padding: 18px;
            border-radius: 14px;
            font-weight: 700;
            font-family: 'Montserrat', sans-serif;
            font-size: 13px;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s var(--ease-smooth);
        }

        .btn-modal-ok:hover {
            box-shadow: var(--shadow-bronze-glow);
        }

        /* Boton instalar app */
        #btnInstalarApp {
            display: none;
            margin-top: 24px;
            background: transparent;
            border: 1px solid rgba(176, 155, 113, 0.3);
            color: var(--accent-bronze);
            padding: 16px 24px;
            border-radius: 14px;
            font-family: 'Montserrat', sans-serif;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s var(--ease-smooth);
            width: 100%;
        }

        #btnInstalarApp:hover {
            background: rgba(176, 155, 113, 0.1);
            border-color: var(--accent-bronze);
        }
    </style>
</head>
<body>

    <div id="modalAlertaCustom" class="custom-modal-overlay">
        <div class="custom-modal-box">
            <div id="textoAlertaCustom" class="custom-modal-text">Mensaje de error</div>
            <button id="btnCerrarAlerta" class="btn-modal-ok">Entendido</button>
        </div>
    </div>

    <div id="cargando">Preparando tu experiencia...</div>

    <div id="pantallaRegistro">
        <h2>BRUNA</h2>
        <p class="subtitle">El Arte del Grano</p>
        
        <div class="input-group">
            <label>Tu Nombre</label>
            <input type="text" id="inputNombre" class="input-box" placeholder="Ej: Simon" required>
        </div>
        
        <div class="input-group">
            <label>WhatsApp</label>
            <input type="tel" id="inputCelular" class="input-box" placeholder="Ej: 2215551234" required>
        </div>
        
        <button class="btn-crear" id="btnCrearTarjeta">Obtener Mi Tarjeta</button>

        <button id="btnInstalarApp">
            Instalar App en tu dispositivo
        </button>
    </div>

    <div id="pantallaTarjeta">
        <p class="texto-girar">Toca la tarjeta para girarla</p>
        
        <div class="flip-container" onclick="this.classList.toggle('flipped')">
            <div class="flipper">
                <div class="front">
                    <div class="wallet-card" style="margin: 0; height: 100%;">
                        <div class="card-header">
                            <div>
                                <div class="logo">BRUNA</div>
                                <span class="logo-tagline">El Arte del Grano</span>
                            </div>
                            <div>
                                <div class="user-nickname" id="displayNombre">...</div>
                                <span class="user-tel-label" id="displayTelLabel">******0000</span>
                            </div>
                        </div>
                        <div class="stamps-container">
                            <div class="stamps-grid" id="gridSellos"></div>
                            <p class="stamps-text">Completa 10 tazas y recibe tu bebida de cortesia</p>
                        </div>
                        <div class="info-row">
                            <div>
                                <div class="info-label">Estado Premio</div>
                                <div class="info-value" id="displayPremio">...</div>
                            </div>
                            <div style="text-align: right;">
                                <div class="info-label">Progreso</div>
                                <div class="info-value info-value-points"><span id="displayPuntos">0</span>/10</div>
                            </div>
                        </div>
                        <div class="qr-section">
                            <div class="qr-box"><img id="qrImage" src="" alt="QR Cliente"></div>
                            <div class="user-id">Identificador Unico</div>
                        </div>
                    </div>
                </div>
                <div class="back">
                    <div class="bruna-circle"><h2 class="back-logo-text">BRUNA</h2></div>
                    <div class="back-subtitle">Bakery</div>
                </div>
            </div>
        </div>
        
        <button id="btnCerrarSesion" class="btn-cerrar">Cerrar sesion en este dispositivo</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        class BrunaApp {
            constructor() {
                const firebaseConfig = {
                    apiKey: "AIzaSyCaqJraAXeZ8F4zCd9GUIdNIHhfU7FMzJk",
                    authDomain: "club-cafe-app.firebaseapp.com",
                    databaseURL: "https://club-cafe-app-default-rtdb.firebaseio.com",
                    projectId: "club-cafe-app",
                    storageBucket: "club-cafe-app.firebasestorage.app",
                    messagingSenderId: "1007849307452",
                    appId: "1:1007849307452:web:2472f6b2cab7deeae53239",
                    measurementId: "G-6314S7TS0T"
                };
                
                this.app = initializeApp(firebaseConfig);
                this.db = getFirestore(this.app);
                this.unsubscribe = null;

                this.ui = {
                    cargando: document.getElementById('cargando'),
                    registro: document.getElementById('pantallaRegistro'),
                    tarjeta: document.getElementById('pantallaTarjeta'),
                    nombre: document.getElementById('displayNombre'),
                    telLabel: document.getElementById('displayTelLabel'),
                    qr: document.getElementById('qrImage'),
                    gridSellos: document.getElementById('gridSellos'),
                    puntos: document.getElementById('displayPuntos'),
                    premio: document.getElementById('displayPremio'),
                    modalAlerta: document.getElementById('modalAlertaCustom'),
                    textoAlerta: document.getElementById('textoAlertaCustom')
                };

                this.vincularEventos();
                this.iniciar();
            }

            vincularEventos() {
                document.getElementById('btnCrearTarjeta').addEventListener('click', () => this.ingresar());
                document.getElementById('btnCerrarSesion').addEventListener('click', () => this.cerrarSesion());
                
                document.getElementById('btnCerrarAlerta').addEventListener('click', () => {
                    this.ui.modalAlerta.style.display = 'none';
                });
            }

            mostrarAlerta(mensaje) {
                this.ui.textoAlerta.innerText = mensaje;
                this.ui.modalAlerta.style.display = 'flex';
            }

            iniciar() {
                const celularLocal = localStorage.getItem('miTarjetaCafeTEL');
                if (celularLocal) {
                    this.abrirTarjeta(celularLocal);
                } else {
                    this.cambiarPantalla('registro');
                }
            }

            cambiarPantalla(pantalla) {
                this.ui.cargando.style.display = pantalla === 'cargando' ? 'block' : 'none';
                this.ui.registro.style.display = pantalla === 'registro' ? 'block' : 'none';
                this.ui.tarjeta.style.display = pantalla === 'tarjeta' ? 'block' : 'none';
            }

            formatearNombre(texto) {
                if (!texto) return "";
                return texto.trim().toLowerCase().replace(/\b\w/g, letra => letra.toUpperCase());
            }

            async ingresar() {
                const nombreIngresado = document.getElementById('inputNombre').value;
                const nombre = this.formatearNombre(nombreIngresado);
                let celular = document.getElementById('inputCelular').value.trim();

                if(!nombre || !celular) return this.mostrarAlerta("Por favor completa tu nombre y numero para continuar.");
                
                celular = celular.replace(/\D/g,''); 
                if(celular.length < 8) return this.mostrarAlerta("El numero de WhatsApp es demasiado corto. Revisa que este bien escrito.");

                this.cambiarPantalla('cargando');
                this.ui.cargando.innerText = "Sincronizando tu tarjeta...";

                try {
                    const docRef = doc(this.db, "clientes", celular);
                    const docSnap = await getDoc(docRef);

                    if (docSnap.exists()) {
                        await setDoc(docRef, { nombre: nombre }, { merge: true });
                    } else {
                        await setDoc(docRef, { 
                            nombre: nombre, 
                            puntos: 0,
                            fechaRegistro: new Date().toISOString()
                        });
                    }
                    
                    localStorage.setItem('miTarjetaCafeTEL', celular);
                    this.abrirTarjeta(celular);
                } catch (e) {
                    console.error("Error:", e);
                    this.mostrarAlerta("Hubo un error de conexion. Revisa tu internet e intenta de nuevo.");
                    this.cambiarPantalla('registro');
                }
            }

            abrirTarjeta(celular) {
                this.cambiarPantalla('tarjeta');
                
                this.ui.qr.src = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${celular}&bgcolor=E5E0DA&color=3C2A21`;
                this.ui.telLabel.innerText = `******${celular.slice(-4)}`;

                this.unsubscribe = onSnapshot(doc(this.db, "clientes", celular), (docSnap) => {
                    if (docSnap.exists()) {
                        const datos = docSnap.data();
                        this.ui.nombre.innerText = datos.nombre;
                        this.renderizarTazas(datos.puntos);
                    } else {
                        this.cerrarSesion(); 
                    }
                });
            }

            renderizarTazas(puntosActuales) {
                const totalTazas = 10;
                this.ui.gridSellos.innerHTML = ''; 

                for (let i = 1; i <= totalTazas; i++) {
                    const contenedorSvg = document.createElement('div');
                    contenedorSvg.innerHTML = this.obtenerSvgTaza();
                    const svgElement = contenedorSvg.querySelector('svg'); 
                    
                    if (i <= puntosActuales) {
                        svgElement.classList.add('filled');
                    }
                    this.ui.gridSellos.appendChild(svgElement);
                }

                this.ui.puntos.innerText = puntosActuales;
                
                if(puntosActuales >= totalTazas) {
                    this.ui.premio.innerText = "Bebida Lista";
                    this.ui.premio.classList.add('premio-listo');
                } else {
                    this.ui.premio.innerText = "En progreso";
                    this.ui.premio.classList.remove('premio-listo');
                    this.ui.premio.style.fontWeight = "400";
                }
            }

            obtenerSvgTaza() {
                return `
                <svg class="stamp-cup" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <path class="steam-path" d="M38,30 V12 M50,32 V8 M62,30 V16" stroke-linecap="round"/>
                    <path class="cup-path" d="M20,35 H80 V75 Q80,90 65,90 H35 Q20,90 20,75 Z" />
                    <path class="coffee-fill" d="M22,37 H78 V73 Q78,88 63,88 H37 Q22,88 22,73 Z" />
                    <path class="cup-path" d="M80,45 Q95,45 95,60 T80,75" />
                </svg>`;
            }

            cerrarSesion() {
                if (this.unsubscribe) this.unsubscribe(); 
                localStorage.removeItem('miTarjetaCafeTEL');
                location.reload();
            }
        }

        window.onload = () => {
            new BrunaApp();
        };
    </script>
    
    <script>
        let eventoInstalacion = null;
        const btnInstalar = document.getElementById('btnInstalarApp');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault(); 
            eventoInstalacion = e;
            btnInstalar.style.display = 'block'; 
        });

        btnInstalar.addEventListener('click', async () => {
            if (!eventoInstalacion) return;
            
            eventoInstalacion.prompt(); 
            
            const { outcome } = await eventoInstalacion.userChoice;
            if (outcome === 'accepted') {
                btnInstalar.style.display = 'none'; 
            }
            eventoInstalacion = null;
        });

        window.addEventListener('appinstalled', () => {
            btnInstalar.style.display = 'none';
        });
    </script>
</body>
</html>
